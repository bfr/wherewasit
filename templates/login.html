<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — No missä se nyt oli?</title>
  <style>
    :root { --bg:#f6f2ea; --card:#fffdf8; --ink:#1f2a44; --muted:#647089; --accent:#2a5d8f; --line:#d9d3c8; --err:#b3261e; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:"DM Sans",system-ui,sans-serif; background:var(--bg); color:var(--ink); }
    .card { width:min(92vw,420px); background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px; box-shadow:0 10px 24px rgba(31,42,68,.08); }
    h1 { margin:0 0 8px; font-size:24px; }
    p { margin:0 0 14px; color:var(--muted); font-size:14px; }
    input, button { width:100%; border-radius:10px; font-size:15px; }
    input { border:1px solid var(--line); padding:10px 12px; margin-bottom:10px; }
    button { border:0; padding:10px 12px; background:var(--accent); color:#fff; font-weight:600; cursor:pointer; }
    .err { color:var(--err); margin-bottom:10px; font-size:14px; }
  </style>
</head>
<body>
  <form class="card" method="post">
    <h1>No missä se nyt oli?</h1>
    <p>Enter password to unlock this personal app.</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <input type="hidden" name="next" value="{{ next_path }}" />
    <input type="password" name="password" autocomplete="current-password" placeholder="Password" required />
    <button type="submit">Unlock</button>
  </form>
</body>
</html>
